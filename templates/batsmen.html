<div class="container">
    <h2>Batting Statistics</h2>
    <table>
        <thead>
            <tr>
                <th>Player</th>
                <th>Mat</th>
                <th>Inn</th>
                <th>Runs</th>
                <th>Avg</th>
                <th>S/R</th>
                <th>HS</th>
            </tr>
        </thead>
        <tbody>
            {% for p in players %}
            <tr>
                <td>**{{ p.name }}**</td>
                <td>{{ p.matches }}</td>
                <td>{{ p.innings }}</td>
                <td>{{ p.runs }}</td>
                <td>{{ p.avg }}</td>
                <td>{{ p.strike_rate }}</td>
                <td>{{ p.high_score }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
