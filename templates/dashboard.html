<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav>
        <a href="/">View Site</a>
        <a href="/logout">Logout</a>
    </nav>
    <div class="container">
        <h1>Admin Dashboard</h1>
        
        <div class="update-box">
            <h3>Post News Update</h3>
            <form action="/post_update" method="POST">
                <textarea name="update_text" placeholder="Write match update here..." required></textarea>
                <button type="submit" class="btn">Post Update</button>
            </form>
        </div>

        <div class="update-box">
            <h3>Upload Stats (Excel)</h3>
            <form action="/update_stats" method="POST" enctype="multipart/form-data">
                <select name="table_type" class="btn" style="background: white; color: black; border: 1px solid #ccc;">
                    <option value="batsmen">Batsmen Table</option>
                    <option value="bowlers">Bowlers Table</option>
                </select>
                <input type="file" name="file" accept=".xlsx, .xls" required>
                <button type="submit" class="btn">Upload & Replace Data</button>
            </form>
        </div>
    </div>
</body>
</html>
